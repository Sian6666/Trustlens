services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trustlens
      POSTGRES_USER: trustlens
      POSTGRES_PASSWORD: trustlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustlens -d trustlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://trustlens:trustlens@db:5432/trustlens
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
